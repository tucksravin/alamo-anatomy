[build]
    command = "yarn run build"
    publish = "build/"
    functions = "functions/"

[[headers]]
    for = "/favicon.png"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/_app/immutable/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"
